name: Test run
on: [push, workflow_dispatch]
jobs:
  test-python:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      
      - name: Set up Python
        uses: priya-kinthali/setup-python@test-1079-new
        with:
          python-version: |
            3.13.14
            3.14.6
      - name: Run main script
        run: |
          which python
          which python3.13
          which python3.14
          echo ""
          python --version
          python3.13 --version
          python3.14 --version